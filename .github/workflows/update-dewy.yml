name: Update dewy formula

on:
  repository_dispatch:
    types: [dewy-release]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to update to (leave empty for latest)"
        required: false

concurrency:
  group: update-dewy
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Generate token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Determine version
        id: version
        run: |
          VERSION="${{ github.event.client_payload.version || github.event.inputs.version || '' }}"
          if [ -z "$VERSION" ]; then
            VERSION=$(curl -s https://api.github.com/repos/alyraffauf/dewy/tags | jq -r '.[0].name' | sed 's/^v//')
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Update formula
        run: python3 scripts/update-dewy.py ${{ steps.version.outputs.version }}

      - name: Create pull request
        id: create-pr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ steps.app-token.outputs.token }}
          commit-message: "Update dewy to ${{ steps.version.outputs.version }}"
          title: "Update dewy formula"
          body: "Automated formula update triggered by new release."
          branch: update-dewy
          delete-branch: true
          reviewers: alyraffauf

      - name: Enable auto-merge
        if: steps.create-pr.outputs.pull-request-number
        run: gh pr merge ${{ steps.create-pr.outputs.pull-request-number }} --auto --squash
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
