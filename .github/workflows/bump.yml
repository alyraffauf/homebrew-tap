name: Bump packages

on:
  schedule:
    - cron: "0 8 * * *" # daily at 08:00 UTC
  workflow_dispatch:

jobs:
  bump:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Generate token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: Homebrew/actions/setup-homebrew@1f8e202ffddf94def7f42f6fa3a482e821489f9c

      - name: Configure git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Open bump PRs
        env:
          HOMEBREW_DEVELOPER: 1
          HOMEBREW_NO_INSTALL_FROM_API: 1
          # Opening PRs as the app (not the default GITHUB_TOKEN) is what lets the
          # resulting PRs trigger the CI workflow, so auto-merge has checks to wait on.
          HOMEBREW_GITHUB_API_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -uo pipefail
          brew tap --force alyraffauf/tap
          tap_dir="$(brew --repository)/Library/Taps/alyraffauf/homebrew-tap"

          # atbbs (resource regeneration) and dewy have their own release-triggered
          # workflows, so brew bump owns everything else: tg + the casks.
          # Bump each package independently so one failure can't abort the rest or
          # skip the auto-merge step below.
          rc=0
          for f in $(ls "$tap_dir"/Formula/*.rb | xargs -n1 basename | sed 's/\.rb$//' | grep -vE '^(atbbs|dewy)$'); do
            echo "::group::bump formula $f"
            brew bump --formula --open-pr --no-fork "alyraffauf/tap/$f" || { echo "::warning::bump failed for formula $f"; rc=1; }
            echo "::endgroup::"
          done
          for c in $(ls "$tap_dir"/Casks/*.rb | xargs -n1 basename | sed 's/\.rb$//'); do
            echo "::group::bump cask $c"
            brew bump --cask --open-pr --no-fork "alyraffauf/tap/$c" || { echo "::warning::bump failed for cask $c"; rc=1; }
            echo "::endgroup::"
          done
          # Don't fail the job on individual bump failures — the auto-merge step must
          # still run for the PRs that did open. Summarize instead.
          [ "$rc" -eq 0 ] && echo "All bumps succeeded." || echo "Some bumps failed (see warnings above)."

      - name: Enable auto-merge on bump PRs
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          prs=$(gh pr list --repo "$GITHUB_REPOSITORY" --state open \
            --json number,headRefName \
            --jq '.[] | select(.headRefName | startswith("bump-")) | .number')
          for pr in $prs; do
            echo "Enabling auto-merge for #$pr"
            gh pr merge "$pr" --auto --squash \
              || echo "::warning::Could not enable auto-merge for #$pr — enable 'Allow auto-merge' in repo settings and require the 'ci-complete' check in branch protection."
          done
