name: Test formulae

on:
  push:
    paths:
      - "Formula/**"
  pull_request:
    paths:
      - "Formula/**"

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install changed formulae
        run: |
          brew tap alyraffauf/tap "$PWD"
          for formula in Formula/*.rb; do
            name=$(basename "$formula" .rb)
            echo "==> Installing $name"
            brew install --build-from-source "$name"
            echo "==> Testing $name"
            brew test "$name"
          done
