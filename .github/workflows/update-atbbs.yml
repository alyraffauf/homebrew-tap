name: Update atbbs formula

on:
  repository_dispatch:
    types: [atbbs-release]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to update to (leave empty for latest)"
        required: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Generate token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Determine version
        id: version
        run: |
          VERSION="${{ github.event.client_payload.version || github.event.inputs.version || '' }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Update formula
        run: python3 scripts/update-formula.py ${{ steps.version.outputs.version }}

      - name: Create pull request
        id: create-pr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ steps.app-token.outputs.token }}
          commit-message: "Update atbbs to ${{ steps.version.outputs.version || 'latest' }}"
          title: "Update atbbs formula"
          body: "Automated formula update triggered by new PyPI release."
          branch: update-atbbs
          delete-branch: true
          reviewers: alyraffauf

      - name: Enable auto-merge
        if: steps.create-pr.outputs.pull-request-number
        run: gh pr merge ${{ steps.create-pr.outputs.pull-request-number }} --auto --squash
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
